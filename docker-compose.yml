services:
  postgres:
    image: postgres:16-alpine
    container_name: cambioapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cambioapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambioapp_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cambioapp}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cambioapp}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./
      dockerfile: apps/api/Dockerfile
    container_name: cambioapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cambioapp}:${POSTGRES_PASSWORD:-cambioapp_dev}@postgres:5432/${POSTGRES_DB:-cambioapp}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_too}
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - ./apps/api:/app/apps/api

  web:
    build:
      context: ./
      dockerfile: apps/web/Dockerfile
    container_name: cambioapp-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - '${WEB_PORT:-5173}:5173'
    volumes:
      - ./apps/web:/app/apps/web

volumes:
  postgres_data:
